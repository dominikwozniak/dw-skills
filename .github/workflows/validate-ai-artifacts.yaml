name: Validate AI artifacts

on:
  pull_request:
    paths:
      - ".ai/**"
      - ".claude/hooks/**"
      - "plugins/*/scripts/runtime/**"
      - "scripts/runtime/**"
      - scripts/tests/**
      - "skills/dw-bootstrap/references/templates/hooks/**"
      - "skills/dw-doctor/scripts/**"
      - scripts/validate-artifacts.sh
      - .github/workflows/validate-ai-artifacts.yaml
  push:
    branches: [main]
    paths:
      - ".ai/**"
      - ".claude/hooks/**"
      - "plugins/*/scripts/runtime/**"
      - "scripts/runtime/**"
      - scripts/tests/**
      - "skills/dw-bootstrap/references/templates/hooks/**"
      - "skills/dw-doctor/scripts/**"
      - scripts/validate-artifacts.sh
      - .github/workflows/validate-ai-artifacts.yaml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate AI artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Validate AI artifacts
        shell: bash
        run: ./scripts/validate-artifacts.sh
