# agnix lint config — dominikwozniak-skills is a Claude Code skills marketplace.
# Docs: https://agent-sh.github.io/agnix/docs/configuration
target = "ClaudeCode"
severity = "Warning"

exclude = [
    "node_modules/**",
    ".git/**",
    # Local agent state (gitignored) — not part of the marketplace surface,
    # so agnix doesn't lint the local drops.
    ".agent/**",
    ".claude/**",
    # Skill template payloads — inert files copied verbatim INTO a target
    # project (e.g. dw-bootstrap's settings.json / hooks / CLAUDE.local.md).
    # They reference `.claude/` paths and hook scripts that only exist once
    # dropped, so they're not validatable in place — same rationale as above.
    "skills/*/references/templates/**",
]

[rules]
skills = true
hooks = true
plugins = true
mcp = true
frontmatter_validation = true
import_references = true
